<html>
  <head>
    <style>
      .start{
        height: 30px;
        width: 105px;
        border: none;
        border-radius: 4px;
        color: white;
        font-weight: bold;
        background-color: rgb(156, 26, 156);
        transition: background-color 0.15s;
        cursor: pointer;
      }
      .start:hover{
        background-color: rgb(95, 16, 130);
      }
      .download{
         height: 30px;
         width: 105px;
         color:grey;
         font-weight: bold;
         border-radius: 4px;
         border-color: grey;
         background-color: white;
         border-style: solid;
         border-width: 1px;
         transition: color 0.15s,background-color 0.15s;
         cursor: pointer;
      }
      .download:hover{
        background-color:grey;
        color: white;
      }
    </style>
  </head>
  <body>
     <button class="start">Get started</button>
     <button class="download">Download</button>
</html>
