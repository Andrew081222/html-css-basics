<html>
  <head>
    <style>
      .application{
        height:30px;
        width: 200px;
        border: none;
        border-radius: 15px;
        background-color:  rgb(45, 45, 182);
        font-weight: bold;
        color: white;
        cursor: pointer;
        transition:background-color 0.15s;
        margin-right: 8px;
      }
      .application:hover{
        background-color:navy;
      }
      .save-button{
        color:rgb(36, 177, 238);
        font-weight: bold;
        background-color: white;
        border: 1px rgb(36, 177, 238) solid;
        border-radius: 15px;
        height: 30px;
        width: 65px;
        cursor: pointer;
        transition: border 0.15s,background-color 0.15s;
      }
      .save-button:hover{
        border: 2px rgb(16, 93, 202) solid;
        background-color: rgb(16, 93, 202,0.2);
      }
    </style>
  </head>
  <body>
    <button class="application">Apply on company website</button>
    <button class="save-button">Save</button>
  </body>
</html>
