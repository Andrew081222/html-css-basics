 <html>
  <head>
    <style>
      .cart{
        height: 35px;
        width: 150px;
        border: none;
        border-radius: 20px;
        background-color: rgb(237, 237, 49);
        font-weight: bold;
        transition: background-color 0.15s;
        cursor: pointer;
      }
      .cart:hover{
        background-color: rgb(205, 205, 56);
      }
    </style>
  </head>
  <body>
    <button class="cart">
      Add to Cart
    </button>
  </body>
 </html>
